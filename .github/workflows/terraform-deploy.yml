name: Terraform Deploy

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY_PUBLIC_SITE: ${{ vars.ECR_REPOSITORY_PUBLIC_SITE }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
  ECS_SERVICE_PUBLIC_SITE: ${{ vars.ECS_SERVICE_PUBLIC_SITE }}
  TF_WORKING_DIR: ${{ vars.TF_WORKING_DIR }}
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_VAR_acm_certificate_arn: ${{ secrets.TF_VAR_ACM_CERTIFICATE_ARN }}
  TF_VAR_alb_https_ssl_policy: ${{ vars.TF_VAR_ALB_HTTPS_SSL_POLICY }}

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    environment: Deployment
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform -chdir="${TF_WORKING_DIR}" fmt -check

      - name: Terraform init
        run: terraform -chdir="${TF_WORKING_DIR}" init -backend-config=backend.dev.hcl

      - name: Terraform validate
        run: terraform -chdir="${TF_WORKING_DIR}" validate

      - name: Terraform plan
        run: terraform -chdir="${TF_WORKING_DIR}" plan -out=tfplan

      - name: Terraform apply
        run: terraform -chdir="${TF_WORKING_DIR}" apply -auto-approve tfplan
      - name: Log in to Amazon ECR
        run: |
          aws ecr get-login-password --region "${AWS_REGION}" \
            | docker login --username AWS --password-stdin "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

      - name: Build and push public site image
        run: |
          IMAGE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY_PUBLIC_SITE}"

          docker buildx build \
            --platform linux/amd64 \
            -f apps/public-site/Dockerfile \
            -t "${IMAGE_URI}:${GITHUB_SHA}" \
            -t "${IMAGE_URI}:latest" \
            --push .

      - name: Deploy public site to ECS
        run: |
          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_SERVICE_PUBLIC_SITE}" \
            --force-new-deployment \
            --region "${AWS_REGION}"